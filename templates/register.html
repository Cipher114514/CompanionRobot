<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 元气充能陪伴平台</title>
    <link rel="stylesheet" href="/static/css/style.css?v=4">
    <style>
        .auth-container {
            max-width: 500px;
            margin: 60px auto;
            padding: 20px;
        }

        .auth-card {
            background: white;
            border-radius: 4px;
            padding: 40px;
            border: 1px solid #e0e0e0;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header h1 {
            font-size: 1.8rem;
            color: #333;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .auth-header p {
            color: #666;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #e0e0e0;
            border-radius: 3px;
            font-size: 0.95rem;
            box-sizing: border-box;
            background: white;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #999;
        }

        .form-group .error-message {
            color: #c53030;
            font-size: 0.8rem;
            margin-top: 5px;
            display: none;
        }

        .form-group.error input, .form-group.error select {
            border-color: #c53030;
        }

        .form-group.error .error-message {
            display: block;
        }

        .role-selection {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .role-option {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }

        .role-option:hover {
            border-color: #999;
        }

        .role-option.selected {
            border-color: #000;
            background: #f5f5f5;
        }

        .role-option input {
            display: none;
        }

        .role-option-label {
            display: block;
            font-weight: 500;
            color: #333;
            margin-bottom: 5px;
        }

        .role-option-desc {
            font-size: 0.8rem;
            color: #666;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: #000;
            color: white;
            border: none;
            border-radius: 3px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
        }

        .btn-submit:hover {
            background: #333;
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .auth-footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .auth-footer a {
            color: #000;
            text-decoration: none;
            font-weight: 500;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .alert {
            padding: 12px;
            border-radius: 3px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background: #f0fff4;
            color: #276749;
            border: 1px solid #68d391;
        }

        .alert-error {
            background: #fff5f5;
            color: #c53030;
            border: 1px solid #fc8181;
        }

        .password-strength {
            margin-top: 8px;
            height: 3px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
        }

        .password-strength-bar {
            height: 100%;
            width: 0%;
        }

        .strength-weak { width: 33%; background: #c53030; }
        .strength-medium { width: 66%; background: #dd6b20; }
        .strength-strong { width: 100%; background: #276749; }

        .strength-text {
            font-size: 0.75rem;
            margin-top: 5px;
            color: #666;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <!-- 注册表单 -->
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>创建账户</h1>
                <p>注册后即可使用完整功能</p>
            </div>

            <div class="alert alert-success" id="successAlert"></div>
            <div class="alert alert-error" id="errorAlert"></div>

            <form id="registerForm" onsubmit="return false;">
                <!-- 角色选择 -->
                <div class="form-group">
                    <label>选择您的身份</label>
                    <div class="role-selection">
                        <label class="role-option selected" id="patientOption">
                            <input type="radio" name="role" value="patient" checked>
                            <span class="role-option-label">患者</span>
                            <span class="role-option-desc">寻求心理咨询帮助</span>
                        </label>
                        <label class="role-option" id="counselorOption">
                            <input type="radio" name="role" value="counselor">
                            <span class="role-option-label">心理咨询师</span>
                            <span class="role-option-desc">查看患者信息</span>
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" required
                           minlength="3" maxlength="20"
                           placeholder="请输入用户名（3-20个字符）">
                    <div class="error-message"></div>
                </div>

                <div class="form-group">
                    <label for="email">邮箱</label>
                    <input type="email" id="email" name="email" required
                           placeholder="请输入邮箱地址">
                    <div class="error-message"></div>
                </div>

                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" required
                           minlength="6" maxlength="50"
                           placeholder="请输入密码（至少6个字符）">
                    <div class="password-strength">
                        <div class="password-strength-bar" id="strengthBar"></div>
                    </div>
                    <div class="strength-text" id="strengthText"></div>
                    <div class="error-message"></div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">确认密码</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required
                           placeholder="请再次输入密码">
                    <div class="error-message"></div>
                </div>

                <!-- 患者需要填写出生日期 -->
                <div class="form-group" id="birthDateGroup">
                    <label for="birthDate">出生日期</label>
                    <input type="date" id="birthDate" name="birthDate" required>
                    <div class="error-message"></div>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">注册</button>
            </form>

            <div class="auth-footer">
                已有账户？ <a href="/login">立即登录</a>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('registerForm');
        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirmPassword');
        const birthDateGroup = document.getElementById('birthDateGroup');
        const birthDateInput = document.getElementById('birthDate');
        const roleInputs = document.querySelectorAll('input[name="role"]');

        // 角色切换
        roleInputs.forEach(input => {
            input.addEventListener('change', function() {
                // 更新选中样式
                document.querySelectorAll('.role-option').forEach(option => {
                    option.classList.remove('selected');
                });
                this.closest('.role-option').classList.add('selected');

                // 患者需要填写出生日期
                if (this.value === 'patient') {
                    birthDateGroup.classList.remove('hidden');
                    birthDateInput.required = true;
                } else {
                    birthDateGroup.classList.add('hidden');
                    birthDateInput.required = false;
                    birthDateInput.value = '';
                }
            });
        });

        // 密码强度检测
        passwordInput.addEventListener('input', function() {
            const password = this.value;
            const strengthBar = document.getElementById('strengthBar');
            const strengthText = document.getElementById('strengthText');

            let strength = 0;
            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;

            strengthBar.className = 'password-strength-bar';

            if (password.length === 0) {
                strengthText.textContent = '';
            } else if (strength <= 2) {
                strengthBar.classList.add('strength-weak');
                strengthText.textContent = '密码强度：弱';
            } else if (strength <= 3) {
                strengthBar.classList.add('strength-medium');
                strengthText.textContent = '密码强度：中';
            } else {
                strengthBar.classList.add('strength-strong');
                strengthText.textContent = '密码强度：强';
            }
        });

        // 表单提交
        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            // 清除之前的错误
            document.querySelectorAll('.form-group').forEach(group => {
                group.classList.remove('error');
                const errorMsg = group.querySelector('.error-message');
                if (errorMsg) errorMsg.textContent = '';
            });
            hideAlerts();

            // 获取表单数据
            const formData = new FormData(form);
            const data = Object.fromEntries(formData);

            // 验证密码
            if (data.password !== data.confirmPassword) {
                showError(confirmInput, '两次输入的密码不一致');
                return;
            }

            // 验证患者必须填写出生日期
            if (data.role === 'patient' && !data.birthDate) {
                showError(birthDateInput, '请填写出生日期');
                return;
            }

            // 转换字段名以匹配后端API
            if (data.birthDate) {
                data.birth_date = data.birthDate;
                delete data.birthDate;
            }
            delete data.confirmPassword;

            // 禁用提交按钮
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = '注册中...';

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    showSuccess(result.message || '注册成功！正在跳转到登录页面...');
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    showErrorAlert(result.error || '注册失败，请重试');
                    submitBtn.disabled = false;
                    submitBtn.textContent = '注册';
                }

            } catch (error) {
                console.error('注册错误:', error);
                showErrorAlert('网络错误，请稍后重试');
                submitBtn.disabled = false;
                submitBtn.textContent = '注册';
            }
        });

        function showError(input, message) {
            const formGroup = input.closest('.form-group');
            formGroup.classList.add('error');
            formGroup.querySelector('.error-message').textContent = message;
        }

        function showSuccess(message) {
            const alert = document.getElementById('successAlert');
            alert.textContent = message;
            alert.classList.add('show');
        }

        function showErrorAlert(message) {
            const alert = document.getElementById('errorAlert');
            alert.textContent = message;
            alert.classList.add('show');
        }

        function hideAlerts() {
            document.getElementById('successAlert').classList.remove('show');
            document.getElementById('errorAlert').classList.remove('show');
        }
    </script>
</body>
</html>
