<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测评结果 - 元气充能陪伴平台</title>
    <link rel="stylesheet" href="/static/css/style.css?v=4">
    <style>
        .result-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            background: #ffffff;
        }

        .result-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .result-header h1 {
            font-size: 1.8rem;
            color: #333333;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .score-card {
            background: #ffffff;
            border: 1px solid #d0d0d0;
            border-radius: 4px;
            padding: 30px;
            margin-bottom: 25px;
        }

        .score-display {
            text-align: center;
            margin-bottom: 25px;
        }

        .score-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: #333333;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            color: white;
            border: 3px solid #333333;
        }

        .score-number {
            font-size: 2.5rem;
            font-weight: 600;
            line-height: 1;
        }

        .score-max {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .severity-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 15px;
        }

        .severity-normal {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .severity-mild {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }

        .severity-moderate {
            background: #ffe8d1;
            color: #d35400;
            border: 1px solid #ffd3a3;
        }

        .severity-severe {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .recommendation-box {
            background: #f5f5f5;
            border-left: 3px solid #333333;
            padding: 18px;
            border-radius: 3px;
            margin-top: 18px;
        }

        .recommendation-box h3 {
            color: #333333;
            margin-bottom: 10px;
            font-size: 1rem;
            font-weight: 600;
        }

        .recommendation-box p {
            color: #555555;
            line-height: 1.6;
            margin: 0;
        }

        .detail-section {
            margin-top: 25px;
        }

        .detail-section h3 {
            color: #333333;
            margin-bottom: 15px;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .answer-list {
            list-style: none;
            padding: 0;
        }

        .answer-item {
            background: #f5f5f5;
            border-radius: 3px;
            padding: 12px 15px;
            margin-bottom: 10px;
            border: 1px solid #e0e0e0;
        }

        .answer-question {
            font-weight: 500;
            color: #333333;
            margin-bottom: 5px;
            font-size: 0.95rem;
        }

        .answer-value {
            color: #333333;
            font-size: 0.9rem;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }

        .action-btn {
            padding: 12px 28px;
            border: 1px solid #d0d0d0;
            border-radius: 3px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s ease;
            background: #ffffff;
            color: #333333;
        }

        .btn-primary {
            background: #333333;
            color: #ffffff;
            border-color: #333333;
        }

        .btn-primary:hover {
            background: #555555;
        }

        .btn-secondary:hover {
            background: #f5f5f5;
        }

        .info-alert {
            background: #d1ecf1;
            border: 1px solid #bee5eb;
            color: #0c5460;
            padding: 12px 15px;
            border-radius: 3px;
            margin-bottom: 20px;
            display: flex;
            align-items: flex-start;
            font-size: 0.9rem;
        }

        .info-alert-icon {
            font-size: 1.2rem;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .warning-alert {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            color: #856404;
            padding: 12px 15px;
            border-radius: 3px;
            margin-bottom: 20px;
            display: flex;
            align-items: flex-start;
            font-size: 0.9rem;
        }

        .warning-alert-icon {
            font-size: 1.2rem;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .chart-container {
            margin-top: 25px;
        }

        .chart-bar {
            background: #e0e0e0;
            border-radius: 3px;
            height: 28px;
            margin-bottom: 15px;
            position: relative;
            overflow: hidden;
        }

        .chart-fill {
            background: #333333;
            height: 100%;
            border-radius: 3px;
            transition: width 1s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            color: white;
            font-size: 0.8rem;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <!-- 统一导航栏 -->
    <nav class="main-nav">
        <div class="nav-container">
            <div class="nav-logo">
                <span class="logo-icon">🧠</span>
                <span class="logo-text">元气充能陪伴平台</span>
            </div>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="/scales" class="nav-link">量表评估</a>
                </li>
                <li class="nav-item">
                    <a href="/chat" class="nav-link">AI对话</a>
                </li>
                {% if current_user.is_authenticated %}
                <li class="nav-item">
                    <a href="/trend-analysis" class="nav-link">趋势分析</a>
                </li>
                <li class="nav-item active">
                    <a href="/profile" class="nav-link user-name">{{ current_user.username }}</a>
                </li>
                <li class="nav-item">
                    <a href="/logout" class="nav-link nav-cta">退出</a>
                </li>
                {% else %}
                <li class="nav-item">
                    <a href="/login" class="nav-link">登录</a>
                </li>
                <li class="nav-item">
                    <a href="/register" class="nav-link nav-cta">注册</a>
                </li>
                {% endif %}
            </ul>
        </div>
    </nav>

    <!-- 主内容 -->
    <div class="result-container">
        <div class="result-header">
            <h1>测评结果</h1>
            <p id="testDate">测试时间：--</p>
        </div>

        <div id="alertMessage"></div>

        <div class="score-card">
            <div class="score-display">
                <div class="score-circle">
                    <div class="score-number" id="scoreNumber">--</div>
                    <div class="score-max" id="scoreMax">/--</div>
                </div>
                <div class="severity-badge" id="severityBadge">--</div>
            </div>

            <div class="recommendation-box">
                <h3>专业建议</h3>
                <p id="recommendation">--</p>
            </div>
        </div>

        <div class="score-card">
            <div class="detail-section">
                <h3>详细分析</h3>
                <div class="chart-container" id="chartContainer"></div>
            </div>
        </div>

        <div class="score-card">
            <div class="detail-section">
                <h3>答题详情</h3>
                <ul class="answer-list" id="answerList"></ul>
            </div>
        </div>

        <div class="score-card" id="historyCard" style="display: none;">
            <div class="detail-section">
                <h3>历史评估记录</h3>
                <p style="color: #666666; margin-bottom: 20px;">您对该量表的历史评估记录</p>
                <div id="historyList"></div>
            </div>
        </div>

        <div class="action-buttons">
            <button class="action-btn btn-secondary" onclick="window.location.href='/scales'">返回量表列表</button>
            <button class="action-btn btn-primary" onclick="window.location.href='/chat'">咨询AI对话</button>
        </div>
    </div>

    <!-- 加载遮罩 -->
    <div class="loading-overlay" id="loadingOverlay" style="display: none;">
        <div class="loading-content">
            <div class="loading-spinner" style="width: 40px; height: 40px; border: 3px solid #e0e0e0; border-top: 3px solid #333333; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px;"></div>
            <div class="loading-text" style="color: #333333; font-size: 1rem;">加载中...</div>
        </div>
    </div>

    <script>
        let resultId = null;
        let resultData = null;
        let scaleId = null;

        document.addEventListener('DOMContentLoaded', async function() {
            const pathParts = window.location.pathname.split('/');
            resultId = pathParts[pathParts.length - 1];

            await loadResult();
            if (scaleId) {
                await loadHistory();
            }
        });

        async function loadResult() {
            document.getElementById('loadingOverlay').style.display = 'flex';

            try {
                const response = await fetch(`/api/scale/result/${resultId}`);
                if (!response.ok) {
                    throw new Error('获取结果失败');
                }

                resultData = await response.json();
                scaleId = resultData.scale_id || null;
                displayResult(resultData);
            } catch (error) {
                console.error('加载结果失败:', error);
                alert('加载结果失败，请返回重试');
                window.location.href = '/scales';
            } finally {
                document.getElementById('loadingOverlay').style.display = 'none';
            }
        }

        async function loadHistory() {
            try {
                const response = await fetch(`/api/scale/${scaleId}/history`);
                if (!response.ok) {
                    return;
                }

                const data = await response.json();
                displayHistory(data.history);
            } catch (error) {
                console.error('加载历史记录失败:', error);
            }
        }

        function displayHistory(history) {
            if (!history || history.length <= 1) {
                return; // 只有当前记录或没有记录时不显示
            }

            const historyCard = document.getElementById('historyCard');
            const historyList = document.getElementById('historyList');

            historyCard.style.display = 'block';

            historyList.innerHTML = '';

            history.forEach((item, index) => {
                // 跳过当前记录
                if (item.result_id === resultId) {
                    return;
                }

                const date = new Date(item.date).toLocaleString('zh-CN');

                // 创建历史记录卡片
                const div = document.createElement('div');
                div.style.cssText = `
                    background: #f5f5f5;
                    border: 1px solid #e0e0e0;
                    border-radius: 3px;
                    padding: 15px;
                    margin-bottom: 12px;
                    cursor: pointer;
                    transition: background-color 0.2s ease;
                    border-left: 3px solid #333333;
                `;
                div.onmouseover = function() {
                    this.style.background = '#e9ecef';
                };
                div.onmouseout = function() {
                    this.style.background = '#f5f5f5';
                };
                div.onclick = function() { window.location.href = `/scale/result/${item.result_id}`; };

                // 严重程度颜色
                let severityColor = '#28a745';
                if (item.level === 'mild' || item.level === 'mild_moderate') {
                    severityColor = '#ffc107';
                } else if (item.level === 'moderate') {
                    severityColor = '#fd7e14';
                } else if (item.level === 'moderately_severe' || item.level === 'severe') {
                    severityColor = '#dc3545';
                }

                div.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 10px;">
                        <div>
                            <div style="font-weight: 600; color: #333333; margin-bottom: 5px; font-size: 0.95rem;">
                                ${date}
                            </div>
                            <div style="display: flex; align-items: center; gap: 10px;">
                                <span style="background: ${severityColor}; color: white; padding: 3px 10px; border-radius: 3px; font-size: 0.8rem; font-weight: 500;">
                                    ${item.severity}
                                </span>
                                <span style="color: #666666; font-size: 0.85rem;">
                                    分数：${item.score}/${item.max_score}
                                </span>
                            </div>
                        </div>
                        <div style="color: #333333; font-weight: 500; font-size: 0.85rem;">
                            查看详情 →
                        </div>
                    </div>
                    ${item.recommendation ? `
                        <div style="margin-top: 10px; padding-top: 10px; border-top: 1px solid #e0e0e0;">
                            <div style="font-size: 0.8rem; color: #555555; line-height: 1.5;">
                                <span style="color: #333333; font-weight: 500;">建议：</span>${item.recommendation}
                            </div>
                        </div>
                    ` : ''}
                `;

                historyList.appendChild(div);
            });
        }

        function displayResult(data) {
            const result = data.result;

            // 测试时间
            document.getElementById('testDate').textContent = `测试时间：${new Date(data.timestamp).toLocaleString('zh-CN')}`;

            // 分数
            document.getElementById('scoreNumber').textContent = result.total_score;
            document.getElementById('scoreMax').textContent = `/${result.max_score}`;

            // 严重程度
            const severityBadge = document.getElementById('severityBadge');
            const severityMap = {
                'normal': '正常',
                'minimal': '无抑郁',
                'mild': '轻度',
                'moderate': '中度',
                'moderately_severe': '中重度',
                'severe': '重度'
            };

            severityBadge.textContent = result.severity;
            severityBadge.className = 'severity-badge';

            // 设置严重程度的样式类
            if (result.level === 'normal' || result.level === 'minimal') {
                severityBadge.classList.add('severity-normal');
            } else if (result.level === 'mild' || result.level === 'mild_moderate') {
                severityBadge.classList.add('severity-mild');
            } else if (result.level === 'moderate') {
                severityBadge.classList.add('severity-moderate');
            } else {
                severityBadge.classList.add('severity-severe');
            }

            // 建议
            document.getElementById('recommendation').textContent = result.recommendation;

            // 警告信息
            const alertDiv = document.getElementById('alertMessage');
            if (result.level === 'moderate' || result.level === 'moderately_severe' || result.level === 'severe') {
                alertDiv.innerHTML = `
                    <div class="warning-alert">
                        <div class="warning-alert-icon">⚠️</div>
                        <div>
                            <strong>重要提醒：</strong>您的测评结果显示可能存在心理健康问题，
                            强烈建议寻求专业心理医生或精神科医生的帮助。
                            如有紧急情况，请立即拨打心理援助热线或前往医院就诊。
                        </div>
                    </div>
                `;
            } else {
                alertDiv.innerHTML = `
                    <div class="info-alert">
                        <div class="info-alert-icon">ℹ️</div>
                        <div>
                            <strong>说明：</strong>本测评结果仅供参考，不能替代专业医疗诊断。
                            如有疑虑，请咨询专业心理医生。
                        </div>
                    </div>
                `;
            }

            // 图表
            const chartContainer = document.getElementById('chartContainer');
            const percentage = (result.total_score / result.max_score) * 100;
            chartContainer.innerHTML = `
                <div class="chart-bar">
                    <div class="chart-fill" style="width: ${percentage}%">${percentage.toFixed(1)}%</div>
                </div>
            `;

            // 答题详情
            const answerList = document.getElementById('answerList');
            if (data.answers_detail && data.answers_detail.length > 0) {
                data.answers_detail.forEach(item => {
                    const li = document.createElement('li');
                    li.className = 'answer-item';
                    li.innerHTML = `
                        <div class="answer-question">${item.question}</div>
                        <div class="answer-value">您的选择：${item.answer}</div>
                    `;
                    answerList.appendChild(li);
                });
            }
        }
    </script>
</body>
</html>
