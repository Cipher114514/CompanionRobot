<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>策略管理 - 元气充能陪伴平台</title>
    <link rel="stylesheet" href="/static/css/style.css?v=6">
    <style>
        .strategy-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .strategy-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .strategy-header h1 {
            color: #667eea;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .strategy-header p {
            color: #666;
            font-size: 1.1rem;
        }

        .strategy-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .strategy-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            cursor: pointer;
            border: 3px solid transparent;
        }

        .strategy-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
        }

        .strategy-card.active {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .strategy-card.active .strategy-icon,
        .strategy-card.active .strategy-name {
            color: white;
        }

        .strategy-card.active .strategy-description {
            color: rgba(255, 255, 255, 0.9);
        }

        .strategy-icon {
            font-size: 3rem;
            margin-bottom: 12px;
        }

        .strategy-name {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
        }

        .strategy-description {
            color: #666;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .strategy-recommend {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            display: inline-block;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .profile-section {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .profile-section h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        .profile-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .profile-item {
            padding: 16px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .profile-label {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 4px;
        }

        .profile-value {
            color: #333;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .healing-factors {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .healing-factors h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        .factor-list {
            list-style: none;
            padding: 0;
        }

        .factor-item {
            padding: 16px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .factor-icon {
            font-size: 2rem;
        }

        .factor-content {
            flex: 1;
        }

        .factor-name {
            font-weight: bold;
            color: #333;
            margin-bottom: 4px;
        }

        .factor-reason {
            color: #666;
            font-size: 0.9rem;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .save-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px 24px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <!-- 统一导航栏 -->
    <nav class="main-nav">
        <div class="nav-container">
            <div class="nav-logo">
                <span class="logo-icon">🧠</span>
                <span class="logo-text">元气充能陪伴平台</span>
            </div>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="/scales" class="nav-link">量表评估</a>
                </li>
                <li class="nav-item">
                    <a href="/chat" class="nav-link">AI对话</a>
                </li>
                <li class="nav-item active">
                    <a href="/profile" class="nav-link user-name">{{ current_user.username }}</a>
                </li>
                <li class="nav-item">
                    <a href="/logout" class="nav-link nav-cta">退出</a>
                </li>
            </ul>
        </div>
    </nav>

    <div class="strategy-container">
        <div class="strategy-header">
            <h1>🎯 个性化疗愈策略</h1>
            <p>根据您的评估结果，为您定制最适合的疗愈方案</p>
        </div>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>正在分析您的疗愈策略...</p>
        </div>

        <div id="strategyContent" style="display: none;">
            <!-- 系统推荐 -->
            <div id="recommendBadge" class="strategy-recommend" style="display: none;">
                🌟 系统推荐：共情型对话风格
            </div>

            <!-- 用户画像 -->
            <div class="profile-section">
                <h2>👤 您的用户画像</h2>
                <div class="profile-grid">
                    <div class="profile-item">
                        <div class="profile-label">抑郁程度</div>
                        <div class="profile-value" id="depressionLevel">-</div>
                    </div>
                    <div class="profile-item">
                        <div class="profile-label">状态趋势</div>
                        <div class="profile-value" id="trendStatus">-</div>
                    </div>
                    <div class="profile-item">
                        <div class="profile-label">推荐风格</div>
                        <div class="profile-value" id="recommendedStyle">-</div>
                    </div>
                </div>
            </div>

            <!-- 疗愈因子推荐 -->
            <div class="healing-factors">
                <h2>💡 推荐的疗愈方法</h2>
                <ul class="factor-list" id="factorList">
                    <!-- 动态生成 -->
                </ul>
            </div>
        </div>
    </div>

    <script>
        let currentStrategy = null;

        // 页面加载时获取策略
        document.addEventListener('DOMContentLoaded', function() {
            console.log('页面加载完成，开始加载策略...');
            loadStrategy();
        });

        async function loadStrategy() {
            console.log('正在加载策略...');
            try {
                const response = await fetch('/api/strategy/get');
                const result = await response.json();

                console.log('策略响应:', result);

                if (result.success) {
                    currentStrategy = result.data;
                    displayStrategy(result.data);
                    console.log('✓ 策略加载成功');
                } else {
                    console.error('获取策略失败:', result.error);
                    document.getElementById('loading').innerHTML =
                        '<p style="color: #f56565;">加载失败，请确保已完成 PHQ-9 评估</p>';
                        '<p style="font-size: 0.9rem; color: #999; margin-top: 8px;">错误信息: ' + result.error + '</p>';
                }
            } catch (error) {
                console.error('加载策略错误:', error);
                document.getElementById('loading').innerHTML =
                    '<p style="color: #f56565;">加载失败，请稍后重试</p>' +
                    '<p style="font-size: 0.9rem; color: #999; margin-top: 8px;">错误: ' + error.message + '</p>';
            }
        }

        function displayStrategy(data) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('strategyContent').style.display = 'block';

            // 显示推荐徽章
            const conversation = data.conversation_strategy;
            const recommendBadge = document.getElementById('recommendBadge');
            recommendBadge.textContent = `🌟 系统推荐：${conversation.style_name}`;
            recommendBadge.style.display = 'inline-block';

            // 更新用户画像
            const profile = data.user_profile;
            document.getElementById('depressionLevel').textContent =
                profile.depression_level.level_name || '未评估';
            document.getElementById('trendStatus').textContent =
                profile.trend.status_name || '未知';
            document.getElementById('recommendedStyle').textContent =
                conversation.style_name || '未知';

            // 显示疗愈因子
            const factors = data.healing_factors || [];
            const factorList = document.getElementById('factorList');
            factorList.innerHTML = '';

            const factorIcons = {
                'music': '🎵',
                'conversation': '💬',
                'meditation': '🧘',
                'exercise': '🏃',
                'social': '👥'
            };

            factors.forEach(factor => {
                const li = document.createElement('li');
                li.className = 'factor-item';
                li.innerHTML = `
                    <div class="factor-icon">${factorIcons[factor.factor_id] || '💡'}</div>
                    <div class="factor-content">
                        <div class="factor-name">${factor.factor_name}</div>
                        <div class="factor-reason">${factor.reason}</div>
                    </div>
                `;
                factorList.appendChild(li);
            });
        }
    </script>
</body>
</html>
