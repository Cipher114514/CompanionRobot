<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>量表测试 - 元气充能陪伴平台</title>
    <link rel="stylesheet" href="/static/css/style.css?v=4">
    <style>
        .test-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            background: #ffffff;
        }

        .test-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .test-header h1 {
            font-size: 1.8rem;
            color: #333333;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .test-header p {
            color: #666666;
            font-size: 0.95rem;
        }

        .progress-bar {
            background: #e0e0e0;
            border-radius: 3px;
            height: 6px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress-fill {
            background: #333333;
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s ease;
            width: 0%;
        }

        .progress-text {
            text-align: center;
            color: #666666;
            font-size: 0.9rem;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .question-card {
            background: #ffffff;
            border: 1px solid #d0d0d0;
            border-radius: 4px;
            padding: 30px;
            margin-bottom: 25px;
        }

        .question-number {
            color: #333333;
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 15px;
        }

        .question-text {
            font-size: 1.2rem;
            color: #333333;
            margin-bottom: 10px;
            line-height: 1.6;
            font-weight: 500;
        }

        .question-description {
            color: #666666;
            font-size: 0.9rem;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-item {
            background: #ffffff;
            border: 1px solid #d0d0d0;
            border-radius: 3px;
            padding: 12px 15px;
            cursor: pointer;
            transition: border-color 0.2s ease;
            display: flex;
            align-items: center;
        }

        .option-item:hover {
            border-color: #333333;
        }

        .option-item.selected {
            border-color: #333333;
            background: #f5f5f5;
        }

        .option-radio {
            width: 18px;
            height: 18px;
            border: 2px solid #666666;
            border-radius: 50%;
            margin-right: 12px;
            position: relative;
            flex-shrink: 0;
        }

        .option-item.selected .option-radio {
            border-color: #333333;
            background: #ffffff;
        }

        .option-item.selected .option-radio::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 8px;
            height: 8px;
            background: #333333;
            border-radius: 50%;
        }

        .option-text {
            color: #333333;
            font-size: 0.95rem;
        }

        .navigation-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
            gap: 15px;
        }

        .nav-btn {
            padding: 12px 28px;
            border: 1px solid #d0d0d0;
            border-radius: 3px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s ease;
            background: #ffffff;
            color: #333333;
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-prev:hover:not(:disabled) {
            background: #f5f5f5;
        }

        .btn-next {
            background: #333333;
            color: #ffffff;
            border-color: #333333;
        }

        .btn-next:hover:not(:disabled) {
            background: #555555;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .loading-content {
            text-align: center;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e0e0e0;
            border-top: 3px solid #333333;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: #333333;
            font-size: 1rem;
        }

        .error-message {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 12px;
            border-radius: 3px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <!-- 统一导航栏 -->
    <nav class="main-nav">
        <div class="nav-container">
            <div class="nav-logo">
                <span class="logo-icon">🧠</span>
                <span class="logo-text">元气充能陪伴平台</span>
            </div>
            <ul class="nav-menu">
                <li class="nav-item active">
                    <a href="/scales" class="nav-link">量表评估</a>
                </li>
                <li class="nav-item">
                    <a href="/chat" class="nav-link">AI对话</a>
                </li>
                {% if current_user.is_authenticated %}
                <li class="nav-item">
                    <a href="/trend-analysis" class="nav-link">趋势分析</a>
                </li>
                <li class="nav-item">
                    <a href="/profile" class="nav-link user-name">{{ current_user.username }}</a>
                </li>
                <li class="nav-item">
                    <a href="/logout" class="nav-link nav-cta">退出</a>
                </li>
                {% else %}
                <li class="nav-item">
                    <a href="/login" class="nav-link">登录</a>
                </li>
                <li class="nav-item">
                    <a href="/register" class="nav-link nav-cta">注册</a>
                </li>
                {% endif %}
            </ul>
        </div>
    </nav>

    <!-- 主内容 -->
    <div class="test-container">
        <div class="test-header">
            <h1 id="scaleTitle">量表测试</h1>
            <p id="scaleDescription">量表描述</p>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressBar"></div>
        </div>
        <div class="progress-text" id="progressText">问题 1 / 10</div>

        <div id="errorMessage" class="error-message" style="display: none;"></div>

        <div class="question-card">
            <div class="question-number" id="questionNumber">问题 1</div>
            <div class="question-text" id="questionText">问题文本</div>
            <div class="question-description" id="questionDescription"></div>
            <div class="options-grid" id="optionsGrid"></div>
        </div>

        <div class="navigation-buttons">
            <button class="nav-btn btn-prev" id="prevBtn" onclick="previousQuestion()">上一题</button>
            <button class="nav-btn btn-next" id="nextBtn" onclick="nextQuestion()">下一题</button>
        </div>
    </div>

    <!-- 加载遮罩 -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <div class="loading-text">加载中...</div>
        </div>
    </div>

    <script>
        let scaleId = null;
        let scaleData = null;
        let currentQuestion = 0;
        let answers = {};

        // 页面加载时获取量表ID和数据
        document.addEventListener('DOMContentLoaded', async function() {
            const pathParts = window.location.pathname.split('/');
            scaleId = pathParts[pathParts.length - 1];

            try {
                await loadScaleData();
                showQuestion(currentQuestion);
            } catch (error) {
                console.error('加载量表数据失败:', error);
                showError('加载量表数据失败，请刷新页面重试');
            } finally {
                document.getElementById('loadingOverlay').style.display = 'none';
            }
        });

        async function loadScaleData() {
            const response = await fetch(`/api/scale/${scaleId}`);
            if (!response.ok) {
                throw new Error('获取量表数据失败');
            }
            scaleData = await response.json();

            // 更新页面标题和描述
            document.getElementById('scaleTitle').textContent = scaleData.info.full_name;
            document.getElementById('scaleDescription').textContent = scaleData.info.description;

            // 初始化答案对象
            scaleData.questions.forEach(q => {
                answers[q.id] = null;
            });
        }

        function showQuestion(index) {
            const question = scaleData.questions[index];
            const totalQuestions = scaleData.questions.length;

            // 更新进度
            const progress = ((index + 1) / totalQuestions) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
            document.getElementById('progressText').textContent = `问题 ${index + 1} / ${totalQuestions}`;

            // 更新问题内容
            document.getElementById('questionNumber').textContent = `问题 ${index + 1}`;
            document.getElementById('questionText').textContent = question.question;
            document.getElementById('questionDescription').textContent = question.description || '';

            // 渲染选项
            const optionsGrid = document.getElementById('optionsGrid');
            optionsGrid.innerHTML = '';

            question.options.forEach((option, idx) => {
                const optionItem = document.createElement('div');
                optionItem.className = 'option-item';
                if (answers[question.id] === option.value) {
                    optionItem.classList.add('selected');
                }

                optionItem.innerHTML = `
                    <div class="option-radio"></div>
                    <div class="option-text">${option.text}</div>
                `;

                optionItem.onclick = () => selectOption(question.id, option.value, optionItem);
                optionsGrid.appendChild(optionItem);
            });

            // 更新按钮状态
            document.getElementById('prevBtn').disabled = index === 0;
            document.getElementById('nextBtn').textContent = index === totalQuestions - 1 ? '提交' : '下一题';
        }

        function selectOption(questionId, value, element) {
            answers[questionId] = value;

            // 更新UI
            const siblings = element.parentElement.children;
            for (let sibling of siblings) {
                sibling.classList.remove('selected');
            }
            element.classList.add('selected');

            // 自动跳转到下一题（延迟一下让用户看到选中效果）
            setTimeout(() => {
                if (currentQuestion < scaleData.questions.length - 1) {
                    nextQuestion();
                }
            }, 300);
        }

        function nextQuestion() {
            // 检查是否已选择答案
            const currentQuestionId = scaleData.questions[currentQuestion].id;
            if (answers[currentQuestionId] === null) {
                showError('请先选择一个选项');
                setTimeout(() => hideError(), 2000);
                return;
            }

            hideError();

            if (currentQuestion < scaleData.questions.length - 1) {
                currentQuestion++;
                showQuestion(currentQuestion);
            } else {
                submitAnswers();
            }
        }

        function previousQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                showQuestion(currentQuestion);
            }
        }

        async function submitAnswers() {
            document.getElementById('loadingOverlay').style.display = 'flex';
            document.querySelector('.loading-text').textContent = '正在分析...';

            try {
                // 验证所有问题都已回答
                const unansweredQuestions = [];
                scaleData.questions.forEach(q => {
                    if (answers[q.id] === null || answers[q.id] === undefined) {
                        unansweredQuestions.push(q.id);
                    }
                });

                if (unansweredQuestions.length > 0) {
                    throw new Error(`还有 ${unansweredQuestions.length} 道题未完成，请完成所有问题后再提交`);
                }

                const response = await fetch('/api/scale/submit', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        scale_id: scaleId,
                        answers: answers
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || '提交答案失败');
                }

                const result = await response.json();

                // 跳转到结果页面
                window.location.href = `/scale/result/${result.result_id}`;
            } catch (error) {
                console.error('提交答案失败:', error);
                showError(error.message || '提交答案失败，请重试');
                document.getElementById('loadingOverlay').style.display = 'none';
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        function hideError() {
            document.getElementById('errorMessage').style.display = 'none';
        }

        // 键盘快捷键支持
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowRight') {
                nextQuestion();
            } else if (e.key === 'ArrowLeft') {
                previousQuestion();
            }
        });
    </script>
</body>
</html>
