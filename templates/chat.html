<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>疗愈机器人 - 元气充能陪伴平台</title>
    <link rel="stylesheet" href="/static/css/style.css?v=7">
</head>
<body>
    <!-- 统一导航栏 -->
    <nav class="main-nav">
        <div class="nav-container">
            <div class="nav-logo">
                <span class="logo-icon">🧠</span>
                <span class="logo-text">元气充能陪伴平台</span>
            </div>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="/scales" class="nav-link">量表评估</a>
                </li>
                <li class="nav-item active">
                    <a href="/chat" class="nav-link">AI对话</a>
                </li>
                {% if current_user.is_authenticated %}
                <li class="nav-item">
                    <a href="/trend-analysis" class="nav-link">趋势分析</a>
                </li>
                <li class="nav-item">
                    <a href="/profile" class="nav-link user-name">{{ current_user.username }}</a>
                </li>
                <li class="nav-item">
                    <a href="/logout" class="nav-link nav-cta">退出</a>
                </li>
                {% else %}
                <li class="nav-item">
                    <a href="/login" class="nav-link">登录</a>
                </li>
                <li class="nav-item">
                    <a href="/register" class="nav-link nav-cta">注册</a>
                </li>
                {% endif %}
            </ul>
        </div>
    </nav>

    <div class="container">
        <!-- 左侧：机器人区域 -->
        <div class="robot-sidebar">
            <div class="avatar-container">
                <div class="robot" id="robot">
                    <div class="robot-antenna">
                        <div class="antenna-ball"></div>
                    </div>
                    <div class="robot-head">
                        <div class="robot-face">
                            <div class="robot-eyes">
                                <div class="eye left">
                                    <div class="pupil"></div>
                                </div>
                                <div class="eye right">
                                    <div class="pupil"></div>
                                </div>
                            </div>
                            <div class="robot-mouth" id="robotMouth"></div>
                        </div>
                        <div class="robot-blush"></div>
                    </div>
                    <div class="robot-body">
                        <div class="robot-heart">♥</div>
                    </div>
                </div>
            </div>
            <div class="avatar-status" id="avatarStatus">你好呀~</div>

            <!-- 历史记录按钮 -->
            <button id="historyBtn" class="btn-history" title="查看历史对话">
                <span class="history-icon">📜</span>
                <span>历史记录</span>
            </button>
        </div>

        <!-- 右侧：聊天区域 -->
        <div class="chat-area">
            <header>
                <h1>🤖 疗愈机器人</h1>
                <div class="status" id="status">系统就绪</div>
            </header>

            <div class="chat-messages" id="chatMessages">
                <div class="message bot">
                    <div class="message-content">
                        你好！我是你的心理陪伴助手。有什么想聊的吗？
                    </div>
                </div>
            </div>

            <!-- 猜你想问 -->
            <div class="suggested-questions" id="suggestedQuestions">
                <div class="suggested-title">💡 猜你想问</div>
                <div class="suggested-list" id="suggestedList">
                    <!-- 动态加载 -->
                    <span class="suggested-placeholder">AI回复后会显示相关问题...</span>
                </div>
            </div>

            <div class="chat-input-container">
                <button id="recordBtn" class="btn-record" title="按住说话">
                    <span class="record-icon">🎤</span>
                </button>
                <textarea
                    id="messageInput"
                    placeholder="输入消息... (Ctrl+Enter发送)"
                    rows="1"
                ></textarea>
                <button id="sendBtn" class="btn-primary">发送</button>
            </div>
            <audio id="audioPlayer" style="display: none;"></audio>
        </div>
    </div>

    <!-- 历史记录模态框 -->
    <div id="historyModal" class="history-modal">
        <div class="history-modal-content">
            <div class="history-modal-header">
                <h2>📜 历史对话记录</h2>
                <button class="btn-close-modal" id="closeHistoryBtn">×</button>
            </div>
            <div class="history-modal-body">
                <div class="history-actions">
                    <div class="history-tip">💡 点击任意对话可查看前后多轮对话上下文</div>
                    <button id="clearHistoryBtn" class="btn-clear-history">
                        <span>🗑️ 清空历史</span>
                    </button>
                </div>
                <div id="historyList" class="history-list">
                    <!-- 历史记录将动态插入到这里 -->
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/chat.js?v=6"></script>
</body>
</html>
