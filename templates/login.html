<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 元气充能陪伴平台</title>
    <link rel="stylesheet" href="/static/css/style.css?v=4">
    <style>
        .auth-container {
            max-width: 500px;
            margin: 60px auto;
            padding: 20px;
        }

        .auth-card {
            background: white;
            border-radius: 4px;
            padding: 40px;
            border: 1px solid #e0e0e0;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header h1 {
            font-size: 1.8rem;
            color: #333;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .auth-header p {
            color: #666;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #e0e0e0;
            border-radius: 3px;
            font-size: 0.95rem;
            box-sizing: border-box;
            background: white;
        }

        .form-group input:focus {
            outline: none;
            border-color: #999;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .remember-me {
            display: flex;
            align-items: center;
        }

        .remember-me input[type="checkbox"] {
            width: auto;
            margin-right: 8px;
        }

        .remember-me label {
            margin: 0;
            font-size: 0.85rem;
            color: #666;
            cursor: pointer;
        }

        .forgot-password {
            font-size: 0.85rem;
        }

        .forgot-password a {
            color: #000;
            text-decoration: none;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: #000;
            color: white;
            border: none;
            border-radius: 3px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
        }

        .btn-submit:hover {
            background: #333;
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .auth-footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .auth-footer a {
            color: #000;
            text-decoration: none;
            font-weight: 500;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .alert {
            padding: 12px;
            border-radius: 3px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-error {
            background: #fff5f5;
            color: #c53030;
            border: 1px solid #fc8181;
        }

        .alert-success {
            background: #f0fff4;
            color: #276749;
            border: 1px solid #68d391;
        }
    </style>
</head>
<body>
    <!-- 登录表单 -->
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>欢迎回来</h1>
                <p>登录您的账户</p>
            </div>

            <div class="alert alert-error" id="errorAlert"></div>
            <div class="alert alert-success" id="successAlert"></div>

            <form id="loginForm" onsubmit="return false;">
                <div class="form-group">
                    <label for="username">用户名或邮箱</label>
                    <input type="text" id="username" name="username" required
                           placeholder="请输入用户名或邮箱">
                </div>

                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" required
                           placeholder="请输入密码">
                </div>

                <div class="form-options">
                    <div class="remember-me">
                        <input type="checkbox" id="remember" name="remember">
                        <label for="remember">记住我</label>
                    </div>
                    <div class="forgot-password">
                        <a href="#" onclick="alert('忘记密码功能开发中')">忘记密码？</a>
                    </div>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">登录</button>
            </form>

            <div class="auth-footer">
                还没有账户？ <a href="/register">立即注册</a>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            hideAlerts();

            const formData = new FormData(form);
            const data = Object.fromEntries(formData);

            submitBtn.disabled = true;
            submitBtn.textContent = '登录中...';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    showSuccess(result.message || '登录成功！正在跳转...');

                    // 获取跳转地址
                    const urlParams = new URLSearchParams(window.location.search);
                    const nextUrl = urlParams.get('next') || '/';

                    setTimeout(() => {
                        window.location.href = nextUrl;
                    }, 1000);
                } else {
                    showErrorAlert(result.error || '登录失败，请检查用户名和密码');
                    submitBtn.disabled = false;
                    submitBtn.textContent = '登录';
                }

            } catch (error) {
                console.error('登录错误:', error);
                showErrorAlert('网络错误，请稍后重试');
                submitBtn.disabled = false;
                submitBtn.textContent = '登录';
            }
        });

        function showErrorAlert(message) {
            const alert = document.getElementById('errorAlert');
            alert.textContent = message;
            alert.classList.add('show');
        }

        function showSuccess(message) {
            const alert = document.getElementById('successAlert');
            alert.textContent = message;
            alert.classList.add('show');
        }

        function hideAlerts() {
            document.getElementById('errorAlert').classList.remove('show');
            document.getElementById('successAlert').classList.remove('show');
        }

        // Enter键提交
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                form.dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
